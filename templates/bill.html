var billSess=0,artList,stopRequested=false;
function rebill(){

    // Сохраняем состояние в куки перед запросом (Issue #6)

                                                            +byArtist,'rebillDone','confirmed=1',vars);
}
// Cookie helpers
function setCookie(name, value) {
    document.cookie = `${ name }=${ encodeURIComponent(JSON.stringify(value)) }; path=/`;
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    if (match) {
        try {
            return JSON.parse(decodeURIComponent(match[2]));
        } catch(e) {
            return null;
        }
    }
    return null;
}

function deleteCookie(name) {
    document.cookie = `${ name }=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
}

// Основная функция обработки
async function processArtists(artList, vars) {
  const initialMaxConcurrent = 2; // Начальная параллельность; снижается до 1 при первой ошибке
  const maxRetries = 3; // Issue #15: после ошибки делаем 3 попытки перерасчета
  let maxConcurrent = initialMaxConcurrent;
  const d = vars ? vars.date : $('.bill-line-new').find('.stream-date').html();
  const baseUrl = 'https://upsound.ideav.online/upsound/report/74694050?JSON_KV&confirmed=1&date='+d+'&FR_byArtist=';
  const progressElement = vars ? vars.el : $('.rebill')[0];
  const logElement = document.getElementById('log');

  let completed = 0;
  let hasError = false;
  const total = artList.length;
  const mismatches = [];

  // Issue #19: запоминаем параллельные запросы, идущие в момент ошибки,
  // приостанавливаем их (через AbortController) и запускаем повторно
  // только после успешного завершения исходного (конкурирующего) запроса —
  // чтобы не было конкуренции при повторных попытках.
  const activeRequests = new Map(); // artist => AbortController
  const suspendedQueue = [];        // ordered list of artists awaiting re-run
  const suspendedSet = new Set();   // membership check for suspendedQueue
  let retryLock = Promise.resolve(); // resolves when no retry is in progress

  // Issue #15: показываем кнопку "Остановить расчет" на время обработки
  stopRequested = false;
  $('#stopBill').show();

  // Восстановление прогресса из cookie
  const savedProgress = getCookie('billProgress');
  if (savedProgress && savedProgress.date === d) {
      completed = savedProgress.completed || 0;
  }

  function log(message) {
      const timestamp = new Date().toLocaleTimeString();
      const id = `log-entry-${ ++logCounter }`;
      logElement.innerHTML = `<div id="${ id }">[${ timestamp }] ${ message }</div>`+logElement.innerHTML;
      logElement.scrollTop = logElement.scrollHeight;
      return id;
  }

  function updateLog(id, message) {
      const el = document.getElementById(id);
      if (!el) return;
      const tsMatch = el.innerHTML.match(/^\[[^\]]+\]/);
      const ts = tsMatch ? tsMatch[0] : '';
      el.innerHTML = `${ ts } ${ message }`;
  }

  function updateProgress() {
      const percent = Math.floor((completed / total) * 100);
      progressElement.textContent = `Прогресс: ${ percent }% (${ completed }/${ total })`;

      // Сохранение прогресса в cookie
      setCookie('billProgress', {
          date: d,
          completed: completed,
          total: total
      });
  }

  async function processArtist(artist, retryCount = 0) {
      if (hasError || stopRequested) return null;
      // Issue #19: если запрос был приостановлен другим (упавшим) параллельным,
      // не запускаем его здесь — он будет запущен после успешного выполнения конкурента.
      if (suspendedSet.has(artist)) return null;

      const url = baseUrl + artist.ArtistID + '&FR_ISRCID=' + artist.ISRCID;
      const controller = new AbortController();
      activeRequests.set(artist, controller);
      const requestPrefix = `Запрос для ${ artist.Artist } (ID: ${ artist.ArtistID }, ISRCID:  ${ artist.ISRCID })...`;
      const requestLogId = log(`${ requestPrefix } ${ ajaxWait }`);

      try {
          const formData = new URLSearchParams();
          formData.append('_xsrf', xsrf);

          const response = await fetch(url, {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/x-www-form-urlencoded'
              },
              body: formData.toString(),
              signal: controller.signal
          });

          if (!response.ok) {
              throw new Error(`HTTP error! status: ${ response.status }`);
          }

          const text = await response.text();

          let data;
          try {
              data = JSON.parse(text);
          } catch (e) {
              throw new Error(`Ответ не является JSON для артиста ${ artist.Artist } (ID: ${ artist.ArtistID })`);
          }

          activeRequests.delete(artist);
          completed++;
          updateProgress();
          updateLog(requestLogId, `${ requestPrefix } ✅ Успешно`);

          const actual = data && data[0] ? data[0].Quantity : null;
          if (actual !== null && String(actual) !== String(artist.Quantity)) {
              mismatches.push({ artist, expected: artist.Quantity, actual });
          }

          return { success: true, artist, data };

      } catch (error) {
          activeRequests.delete(artist);

          // Issue #19: запрос был приостановлен (abort) из-за ошибки в параллельном —
          // тихо выходим, он будет перезапущен из suspendedQueue.
          if (error.name === 'AbortError' || suspendedSet.has(artist)) {
              log(`⏸ Параллельный запрос приостановлен: ${ artist.Artist }`);
              return null;
          }

          // Добавляем URL к сообщению об ошибке
          const errorWithUrl = `${ error.message }\nURL: ${ url }`;

          // Issue #15: при первой ошибке снижаем параллельность до 1 и не восстанавливаем,
          // пока продолжаются ошибки/повторы
          if (maxConcurrent !== 1) {
              maxConcurrent = 1;
              log(`⚙️ maxConcurrent установлен в 1 после ошибки`);
          }

          // Issue #19: запоминаем все параллельно идущие запросы и приостанавливаем их —
          // их повторный запуск откладывается до успешного завершения текущего.
          for (const [otherArtist, otherController] of activeRequests) {
              if (otherArtist === artist || suspendedSet.has(otherArtist)) continue;
              log(`⏸ Приостановлен параллельный запрос: ${ otherArtist.Artist } (ID: ${ otherArtist.ArtistID })`);
              suspendedSet.add(otherArtist);
              suspendedQueue.push(otherArtist);
              try { otherController.abort(); } catch (_) {}
          }

          // Issue #19: захватываем retryLock на время задержки и повторной попытки —
          // это блокирует планировщик в processWithLimit от запуска новых запросов,
          // чтобы не было конкуренции с retry.
          if (retryCount < maxRetries) {
              const attempt = retryCount + 1;
              log(`⚠️ Ошибка, попытка ${ attempt }/${ maxRetries } через 5 секунд: ${ errorWithUrl }`);

              let releaseLock;
              const prevLock = retryLock;
              retryLock = new Promise(resolve => { releaseLock = resolve; });
              try {
                  await prevLock;
                  await new Promise(resolve => setTimeout(resolve, 5000));
                  if (stopRequested) return null;
                  return await processArtist(artist, attempt);
              } finally {
                  releaseLock();
              }
          }

          hasError = true;
          progressElement.textContent = `❌ Ошибка: ${ error.message }`;
          progressElement.style.color = 'red';
          updateLog(requestLogId, `${ requestPrefix } ❌ ОШИБКА после ${ maxRetries } попыток: ${ errorWithUrl }`);

          // Сохраняем состояние при ошибке (Issue #6)
          setCookie('billState', {
              date: d,
              byArtist: byArtist,
              error: error.message,
              errorUrl: url,
              timestamp: new Date().toISOString()
          });

          throw new Error(errorWithUrl);
      }
  }

  async function processWithLimit(items) {
      const results = [];
      const executing = [];

      // Начинаем с сохраненного индекса
      const startIndex = savedProgress && savedProgress.date === d ? completed : 0;

      for (let idx = startIndex; idx < items.length; idx++) {
          if (hasError || stopRequested) break;

          // Issue #19: ждем завершения retry перед запуском новых запросов —
          // чтобы не создавать конкуренции с повторной попыткой упавшего запроса.
          await retryLock;
          if (hasError || stopRequested) break;

          const item = items[idx];
          const promise = processArtist(item).then(result => {
              executing.splice(executing.indexOf(promise), 1);
              return result;
          });

          results.push(promise);
          executing.push(promise);

          // Issue #15: читаем актуальное значение maxConcurrent на каждой итерации,
          // чтобы снижение до 1 после ошибки вступало в силу немедленно
          if (executing.length >= maxConcurrent) {
              await Promise.race(executing);
          }
      }

      await Promise.all(results);

      // Issue #19: после успешного завершения всех запросов запускаем приостановленные
      // (которые были конкурентами упавших) — теперь без конкуренции, последовательно.
      while (suspendedQueue.length > 0 && !hasError && !stopRequested) {
          await retryLock;
          if (hasError || stopRequested) break;
          const artist = suspendedQueue.shift();
          suspendedSet.delete(artist);
          log(`▶️ Запуск приостановленного запроса: ${ artist.Artist } (ID: ${ artist.ArtistID })`);
          results.push(await processArtist(artist));
      }

      return results;
  }

  updateProgress();
  progressElement.style.color = 'black';
  log(`🚀 Начало обработки ${ total } артистов (макс. ${ maxConcurrent } параллельных)`);

  try {
      const results = await processWithLimit(artList);

      // Issue #15: скрываем кнопку "Остановить расчет" по завершении обработки
      $('#stopBill').hide();

      if (stopRequested) {
          progressElement.textContent = `⏹ Остановлено пользователем (${ completed }/${ total })`;
          progressElement.style.color = 'orange';
          log(`⏹ Обработка остановлена пользователем`);
          return results.filter(r => r !== null);
      }

      if (!hasError) {
          progressElement.textContent = `✅ Готово: 100% (${ total }/${ total })`;
          progressElement.style.color = 'green';
          log(`🎉 Обработка завершена успешно!`);

          // Удаляем cookie после завершения
          deleteCookie('billProgress');

          // Отображаем расхождения если они есть
          if (mismatches.length > 0) {
              const tbody = document.getElementById('mismatches-table');
              tbody.innerHTML = '';
              for (const m of mismatches) {
                  const tr = document.createElement('tr');
                  tr.innerHTML = `<td>${ m.artist.Artist }</td><td>${ m.artist.ISRCID }</td><td align="right" class="text-danger font-weight-bold">${ m.expected }</td><td align="right">${ m.actual }</td>`;
                  tbody.appendChild(tr);
              }
              document.getElementById('mismatches').style.display = '';
          }

          // Вызываем rebillDone для обновления статистики и перехода к следующей строке
          if (vars) {
              rebillDone(null, vars);
          }
      }

      return results.filter(r => r !== null);

  } catch (error) {
      // Issue #15: скрываем кнопку "Остановить расчет" при критической ошибке
      $('#stopBill').hide();
      log(`💥 Критическая ошибка: ${ error.message }`);
      throw error;
  }
}

function billArtists(vars,d){
    newApi('POST','report/79265113?JSON_KV&FR_date='+d,'processArtists','',vars);

    deleteCookie('billState');

    else
        newApi('POST','report/74694096?JSON_KV&FR_date='+vars.date+byArtist,'rebillRecalc','',vars.el);
}

}
function fetchStats(){
    const bill=dates.shift();
    if(bill&&bill.date){
        $('.bill-line-new').removeClass('bill-line-new');
        $('.bill-table').append(rowTemplate);
        $('.bill-line-new').find('.stream-date').html(bill.date);
        $('.bill-line-new').find('.qty').html(ajaxWait);
        if(byArtist==='')
            newApi('POST','report/63350550?JSON_KV&FR_Stream='+bill.date,'fetchStatsDone');
        else
            newApi('POST','report/74694086?JSON_KV&FR_Stream='+bill.date+byArtist,'fetchStatsDone');
    }
}
function fetchStatsDone(json){
    $('.bill-line-new').find('.fact').html(ajaxWait);
    $('.bill-line-new').find('.qty').html(json[0].Quantity);
    if(byArtist==='')
        newApi('GET','report/7425710?JSON_KV&FR_date='+json[0].Stream,'fetchBills');
    else
        newApi('GET','report/74694096?JSON_KV&FR_date='+json[0].Stream+byArtist,'fetchBills');
}
function fetchBills(json){
    if(json[0]){
        $('.bill-line-new').find('.fact').html(json[0].Quantity);
        if(json[0].Quantity!==$('.bill-line-new').find('.qty').html()||search.recalcAll)
            $('.bill-line-new').find('.fact').addClass('text-danger font-weight-bold');
        else if(i++>7&&!search.recalcAll)
            return $('.bill-all').show();
        else
            return fetchStats();
    }
    else
        $('.bill-line-new').find('.fact').html('—');
    rebill();
}

// Проверка сохраненного состояния при загрузке страницы (Issue #6)
const savedState = getCookie('billState');
if (savedState) {
    const timestamp = new Date(savedState.timestamp).toLocaleString();
    const logDiv = document.getElementById('log');
    if (logDiv && savedState.error) {
        logDiv.innerHTML = `<div style="color: red; font-weight: bold; padding: 10px; background: #fff3cd; border: 1px solid #ffc107; margin-bottom: 10px;">
            ⚠️ Обнаружено сохраненное состояние после ошибки:<br>
            Дата: ${ savedState.date }<br>
            Ошибка: ${ savedState.error }<br>
            Время: ${ timestamp }<br>
            При перезагрузке обработка продолжится с сохраненной позиции.
        </div>`;
    }
}
